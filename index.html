<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my life tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h2>to do list</h2>
            <div class="row">
                <input type="text" id="input-box" placeholder="add your text">
                <button onclick="addTask()">add</button>
            </div>
            <ul id="list-container"></ul>

            <h2>Habits</h2>

            <div id="habits">
                <div class="habit habit-water">
                    💧 Water: <span id="waterValue">0</span>/2500 ml
                        <button onclick="addWater()">+250 ml</button>
                </div>
                <div class="habit habit-gym" onclick="gymDone()">🏋️ Gym</div>
                <div class="habit habit-reading">
                    📖 Reading: <span id="readingValue">0</span>/30 min
                    <button onclick="addReading()">+5 min</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>  
</body>
</html>
