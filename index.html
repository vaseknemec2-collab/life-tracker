<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<div class="todo-app">

    <!-- HABITS PAGE -->
    <div id="habitsPage" class="page">

        <h2>To Do List</h2>

        <div class="row">
            <input type="text" id="input-box" placeholder="add your text">
            <button onclick="addTask()">add</button>
        </div>

        <ul id="list-container"></ul>

        <h2>Habits</h2>

        
        <div id="habits"></div>
    </div>
    
    <!-- STREAK -->
    <div id="streakPage" class="page" style="display:none;">
        <h2>🔥 Streak</h2>
        <p style="text-align:center;">Coming soon...</p>
    </div>
    
    <!-- PROGRESS -->
    <div id="progressPage" class="page" style="display:none;">
        <h2>📊 Progress</h2>
        <p style="text-align:center;">Coming soon...</p>
    </div>
    
    <!-- SETTINGS -->
    <div id="settingsPage" class="page" style="display:none;">
        
        <h2>⚙️ Settings</h2>
        
        <div class="row">
            <input type="text" id="habitName" placeholder="Habit name">
            <input type="number" id="habitGoal" placeholder="goal">
            <input type="number" id="habitStep" placeholder="step (+ amount)">
            <input type="text" id="habitUnit" placeholder="unit (ml/min/etc)">
            <button onclick="addHabit()">add</button>
        </div>
        
        <div class="settings-box">
            
            <h3>Manage Habits</h3>
            <div id="habitSettingsList"></div>
            
            <button onclick="resetAll()" style="background:#ff4d4d; color:white;">
                Reset ALL DATA
            </button>
            
        </div>
        
    </div>
    
</div>
</div>

<!-- NAV -->
<div class="bottom-nav">
    <div class="nav-item active" data-page="habits">Habits</div>
    <div class="nav-item" data-page="streak">Streak</div>
    <div class="nav-item" data-page="progress">Progress</div>
    <div class="nav-item" data-page="settings">Settings</div>
</div>

<script src="app.js"></script>

</body>
</html>
